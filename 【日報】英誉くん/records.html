<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>日報</title>

 <link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>

body {
  font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 24px;
  border: 1px solid #ccc;
}

h1 {
  text-align: center;
  font-size: 48px;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 20px;
}
/* スマホ対応 */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;  /* 1列にする */
  }
}

.grid > div {
  min-width: 0;
}

.section {
  border: 1px dashed #4aa3c0;
  padding: 10px;
  margin-bottom: 10px;
  overflow-wrap: break-word;
}

.section h2 {
  font-size: 12px;
  margin-bottom: 2px;
  color: #1e6f8b;
}

.section h5 {
  font-size: 10px;
  margin-bottom: 2px;
  color: #000000;
}

input,
textarea {
  width: 100%;
  padding: 6px;
  font-size: 14px;
}

textarea {
  min-height: 40px;
}

input, textarea {
  box-sizing: border-box;
}

.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.checkbox-group label {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  white-space: normal;
  line-height: 1.5;
}

.checkbox-group span {
  display: inline-block;
  max-width: calc(100% - 24px);
  word-break: break-word;
}

.checkbox-group span {
  writing-mode: horizontal-tb !important;
  white-space: normal;
}

button {
  margin: 30px auto 0;
  display: block;
  padding: 12px 40px;
  font-size: 16px;
  background: #1e6f8b;
  color: white;
  border: none;
  cursor: pointer;
}
/* ===== チェックボックス行を強制的に横書き・横並び ===== */
.checkbox-group {
  display: block;
}

.checkbox-group label {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.checkbox-group input {
  flex-shrink: 0;
}

.checkbox-group span {
  display: inline-block;
  writing-mode: horizontal-tb;
}

/* ===== 今日の体調：最終安定版 ===== */
.condition-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.condition-item {
  display: grid;
  grid-template-columns: 20px 1fr;
  column-gap: 8px;
  align-items: start;
}

.condition-item .text {
  line-height: 1.6;
  word-break: normal;
  overflow-wrap: break-word;
}
/* ===== 過去記録 ===== */
#reportList {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.date-button {
  padding: 6px 12px;
  border: 1px solid #1e6f8b;
  background: white;
  color: #1e6f8b;
  cursor: pointer;
  border-radius: 4px;
}

.date-button:hover {
  background: #1e6f8b;
  color: white;
}

#reportDetail {
  border: 1px dashed #4aa3c0;
  padding: 16px;
  background: #f9fdff;
  white-space: pre-wrap;
}

.task-item {
  display: flex;
  align-items: center;   /* 中央揃え */
  gap: 8px;
  height: 32px;          /* ← 高さを固定 */
}

.task-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
}

.task-item .text {
  font-size: 14px;
}

.month-folder {
  margin-bottom: 15px;
  padding: 10px;
  border-radius: 8px;
  background: #f4f6fb;
}

.month-title {
  font-weight: bold;
  margin-bottom: 6px;
}

.day-item {
  margin-left: 10px;
  font-size: 14px;
  cursor: pointer;
}

.day-item:hover {
  text-decoration: underline;
}


textarea,
input,
button {
  width: 100%;
  box-sizing: border-box;
}

.section-box {
  border: 2px dashed #5aa0b8;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  background-color: #f9fcff;
}

.section-title {
  font-weight: bold;
  color: #2c6f88;
  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 15px;
}

.goal-select {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

</style>
</head>

<body>


<h2>過去の記録</h2>
<div class="monthly-summary">
  <h2>📊 月間サマリー</h2>

  <select id="summaryMonthSelect"></select>
  <button onclick="loadMonthlySummary()">表示</button>
<div id="summaryResult"></div>
<textarea id="reflectionOutput" rows="15" style="width:100%;"></textarea>
</div>

<button onclick="runAI()">AI分析</button>
<div id="aiResult"></div>

<div id="monthList"></div>

<div id="reportDetail" style="margin-top:20px;"></div>

</div>

<button onclick="location.href='index.html'">
  🏠 日報へ戻る
</button>

<script>

const date = document.getElementById("date");
const sleepTime = document.getElementById("sleepTime");
const wakeTime = document.getElementById("wakeTime");
const activity = document.getElementById("activity");
const todayGoal = document.getElementById("todayGoal");
const learned = document.getElementById("learned");
const goodAction = document.getElementById("goodAction");
const reflection = document.getElementById("reflection");
const tomorrowGoal = document.getElementById("tomorrowGoal");

const firebaseConfig = {
  apiKey: "AIzaSyAMFy3bodVZTlnmrLzpJGCKbkCvSCkdFVY",
  authDomain: "nh-daily.firebaseapp.com",
  projectId: "nh-daily",
  storageBucket: "nh-daily.firebasestorage.app",
  messagingSenderId: "33233582481",
  appId: "1:33233582481:web:438dfcebfa970c5a730230"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ===== 過去の記録一覧 ===== */
async function loadGroupedDiaries() {
  const monthList = document.getElementById("monthList");
  monthList.innerHTML = "";

  const snapshot = await db.collection("daily_reports").get();

  const grouped = {};

  snapshot.forEach(doc => {
    const data = doc.data();
    if (!data.date) return;

    const month = data.date.slice(0, 7);

    if (!grouped[month]) grouped[month] = [];

    grouped[month].push({
      id: doc.id,
      date: data.date,
      data: data
    });
  });

  const sortedMonths = Object.keys(grouped).sort().reverse();

  sortedMonths.forEach(month => {

    const monthDiv = document.createElement("div");
    monthDiv.className = "month-folder";

    // ▼ 月タイトル（ボタン化）
    const titleBtn = document.createElement("button");
    titleBtn.className = "month-title";
    titleBtn.textContent = "▶ " + month;

    // ▼ 日付を入れる箱（最初は非表示）
    const daysContainer = document.createElement("div");
    daysContainer.style.display = "none";

    grouped[month]
      .sort((a, b) => b.date.localeCompare(a.date))
      .forEach(item => {

        const dayDiv = document.createElement("div");
        dayDiv.className = "day-item";
        dayDiv.textContent = "   └ " + item.date;

        dayDiv.onclick = () => showReport(item.id, item.data);

        daysContainer.appendChild(dayDiv);
      });

    // ▼ クリックで開閉
    titleBtn.onclick = () => {
      const isOpen = daysContainer.style.display === "block";

      daysContainer.style.display = isOpen ? "none" : "block";
      titleBtn.textContent = (isOpen ? "▶ " : "▼ ") + month;
    };

    monthDiv.appendChild(titleBtn);
    monthDiv.appendChild(daysContainer);
    monthList.appendChild(monthDiv);
  });
}

loadGroupedDiaries();

/* ===== 記録表示 ===== */

function showReport(docId, data) {
  const detail = document.getElementById("reportDetail");

  detail.innerHTML = `
<b>日付：</b>${data.date}<br>
<b>就寝：</b>${data.sleepTime}<br>
<b>起床：</b>${data.wakeTime}<br><br>

<b>体調：</b><br>
${(data.condition || []).join(" / ")}<br><br>

<b>今日の活動：</b><br>
${data.activity}<br><br>


<b>今日の目標：</b><br>
${data.todayGoal}<br><br>

<b>目標達成度：</b><br>
${data.goalScore}<br><br>

<b>学んだこと：</b><br>
${data.learned}<br><br>

<b>良かった点：</b><br>
${data.goodAction}<br><br>

<b>反省点：</b><br>
${data.reflection}<br><br>

<b>明日の目標：</b><br>
${data.tomorrowGoal}<br><br>

<b>今日のタスク：</b><br>
${(data.task || []).join(" / ")}<br><br>

<button id="deleteBtn" style="
  margin-top:20px;
  padding:10px 20px;
  background:#e74c3c;
  color:white;
  border:none;
  cursor:pointer;
">
  この記録を削除
</button>
`;

  document.getElementById("deleteBtn").onclick = () => deleteReport(docId);
}

/* ===== 削除 ===== */
async function deleteReport(docId) {
  if (!confirm("この記録を削除してもいい？")) return;

  await db.collection("daily_reports").doc(docId).delete();

  alert("削除しました");
  document.getElementById("reportDetail").innerHTML = "";
  loadGroupedDiaries();
}

/* ===== 月プルダウン生成 ===== */
document.addEventListener("DOMContentLoaded", async () => {

  const snapshot = await db.collection("daily_reports").get();
  const months = new Set();

  snapshot.forEach(doc => {
    const data = doc.data();
    if (!data.date) return;

    const month = data.date.slice(0, 7); // ← フィールドから取得
    months.add(month);
  });

  const select = document.getElementById("summaryMonthSelect");
  select.innerHTML = "";

  Array.from(months)
    .sort()
    .reverse()
    .forEach(month => {
      const option = document.createElement("option");
      option.value = month;
      option.textContent = month;
      select.appendChild(option);
    });

  // 最初の月を自動表示
  if (select.value) {
    loadMonthlySummary();
  }
});

/* ===== サマリー表示 ===== */
window.loadMonthlySummary = async function () {

  const month = document.getElementById("summaryMonthSelect").value;
  if (!month) return;

  const start = month + "-01";
  const end = month + "-31";

  const snapshot = await db.collection("daily_reports")
    .where("date", ">=", start)
    .where("date", "<=", end)
    .get();

  let recordCount = snapshot.size;
  let conditionCount = {};
  let taskCount = {};
  let totalSleep = 0;
  let sleepDays = 0;
  let dates = [];

  let totalScore = 0;
  let goalDays = 0;

  let starCount = {
    5: 0,
    4: 0,
    3: 0,
    2: 0,
    1: 0
  };

  let reflectionText = "";

  // ===== データ集計（ここに全部入れる）=====
  snapshot.forEach(doc => {

    const data = doc.data();
    if (!data.date) return;

    dates.push(data.date);

reflectionText += `
【${doc.id}】

■学んだこと
${data.learned || "なし"}

■良かった点
${data.goodAction || "なし"}

■反省点
${data.reflection || "なし"}

`;
    
    // ★目標評価
    if (data.goalScore) {
      const score = Number(data.goalScore);
      totalScore += score;
      goalDays++;

      if (starCount[score] !== undefined) {
        starCount[score]++;
      }
    }

    // 体調
    (data.condition || []).forEach(c => {
      conditionCount[c] = (conditionCount[c] || 0) + 1;
    });

    // タスク
    (data.task || []).forEach(t => {
      taskCount[t] = (taskCount[t] || 0) + 1;
    });

    // 睡眠
    if (data.sleepTime && data.wakeTime) {
      const sleep = new Date("2000-01-01 " + data.sleepTime);
      const wake = new Date("2000-01-01 " + data.wakeTime);
      let diff = (wake - sleep) / (1000 * 60 * 60);
      if (diff < 0) diff += 24;
      totalSleep += diff;
      sleepDays++;
    }

  }); // ← forEachここで閉じる

  // ===== 平均達成度 =====
  let avgScore = goalDays
    ? (totalScore / goalDays).toFixed(1)
    : "-";

  // ===== ★分布HTML =====
  let starHtml = `
    <p>★5：${starCount[5]}日</p>
    <p>★4：${starCount[4]}日</p>
    <p>★3：${starCount[3]}日</p>
    <p>★2：${starCount[2]}日</p>
    <p>★1：${starCount[1]}日</p>
  `;

  // ===== 体調トップ =====
  let topCondition = "なし";
  let topCount = 0;

  for (let key in conditionCount) {
    if (conditionCount[key] > topCount) {
      topCondition = key;
      topCount = conditionCount[key];
    }
  }

  // ===== 平均睡眠 =====
  let avgSleep = sleepDays
    ? (totalSleep / sleepDays).toFixed(1)
    : "-";

  // ===== 連続記録 =====
  dates.sort();
  let streak = 1;
  let maxStreak = recordCount > 0 ? 1 : 0;

  for (let i = 1; i < dates.length; i++) {
    const prev = new Date(dates[i - 1]);
    const curr = new Date(dates[i]);
    const diff = (curr - prev) / (1000 * 60 * 60 * 24);

    if (diff === 1) {
      streak++;
      maxStreak = Math.max(maxStreak, streak);
    } else {
      streak = 1;
    }
  }

  // ===== タスクHTML =====
  let taskHtml = "";
  for (let key in taskCount) {
    taskHtml += `<p>${key}：${taskCount[key]}回</p>`;
  }

  // ===== 表示 =====
  document.getElementById("summaryResult").innerHTML = `
    <h3>📅 ${month} サマリー</h3>
    <p>記録日数：${recordCount}日</p>
    <p>連続記録：${maxStreak}日</p>
    <p>体調トップ：${topCondition}（${topCount}回）</p>
    <p>平均睡眠：${avgSleep}時間</p>

    <h4>🎯 目標平均達成度：${avgScore} / 5</h4>
    <h4>🌟 目標達成度 分布</h4>
    ${starHtml}

    <h4>📌 タスク実施回数</h4>
    ${taskHtml || "<p>データなし</p>"}
  `;

  document.getElementById("reflectionOutput").value = reflectionText;

};

async function runAI() {

  const diaryText = document.getElementById("reflectionOutput").value;

  if (!diaryText) {
    alert("先に月を選んでサマリーを表示してください");
    return;
  }

  const res = await fetch("/.netlify/functions/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ diaryText })
  });

  const data = await res.json();

  document.getElementById("aiResult").innerText = data.result;
}

</script>
</body>
</html>
